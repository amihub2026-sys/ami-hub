<div class="service-categories-container">
  <h1>Service Categories</h1>
  <div class="categories-grid">
    
    <div class="cat-card" (click)="navigateToService('home-services')">
      <div class="cat-icon home"><img src="assets/icons/home.png" alt="Home Services"></div>
      <p>Home Services</p>
    </div>

    <div class="cat-card" (click)="navigateToService('plumbing')">
      <div class="cat-icon plumber"><img src="assets/icons/plumber.png" alt="Plumbing"></div>
      <p>Plumbing</p>
    </div>

    <div class="cat-card" (click)="navigateToService('electrician')">
      <div class="cat-icon electrician"><img src="assets/icons/electrician.png" alt="Electrician"></div>
      <p>Electrician</p>
    </div>

    <div class="cat-card" (click)="navigateToService('cleaning')">
      <div class="cat-icon cleaning"><img src="assets/icons/cleaning.png" alt="Cleaning"></div>
      <p>Home Cleaning</p>
    </div>

    <div class="cat-card" (click)="navigateToService('tutoring')">
      <div class="cat-icon tutor"><img src="assets/icons/tutor.png" alt="Tutors"></div>
      <p>Tutors</p>
    </div>

    <div class="cat-card" (click)="navigateToService('beauty')">
      <div class="cat-icon beauty"><img src="assets/icons/beauty.png" alt="Beauty Services"></div>
      <p>Beauty Services</p>
    </div>

  </div>
</div>
